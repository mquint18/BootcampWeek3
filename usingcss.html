<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Using Css</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Welcome</h1>
    <p>This is my new website with css styling</p>
    <button>Click Me!</button>

    <h1 class="first">This is a class tag</h1>
    <h2 class="first">still using class</h2>

    <h1 class="second">This is a different class</h1>

    <h1 id="newid">This is using an ID tag</h1>

    <p class="box">This is using Css styling for box model</p>

    <div class="container">
        <div>Item 1</div>
        <div>Item 2</div>
    </div>

</body>

</html>
